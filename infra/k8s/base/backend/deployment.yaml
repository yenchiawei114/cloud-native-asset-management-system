apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: asset-mgmt
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: asset-mgmt-app
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: backend
                topologyKey: topology.kubernetes.io/zone
      containers:
        - name: backend
          image: asia-east1-docker.pkg.dev/cloud-native-project-494008/asset-mgmt/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: asset-mgmt-config
            - secretRef:
                name: asset-mgmt-secrets
          env:
            - name: DB_URL
              value: "mysql+asyncmy://app:$(DB_PASSWORD)@cloudsql-proxy:3306/asset_mgmt"
            - name: DB_SYNC_URL
              value: "mysql+pymysql://app:$(DB_PASSWORD)@cloudsql-proxy:3306/asset_mgmt"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
