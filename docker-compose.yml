name: cnams

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-app}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-app}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./infra/local/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./infra/local/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test: ["CMD-SHELL", "mysql -h localhost -u$${MYSQL_USER:-app} -p$${MYSQL_PASSWORD:-app} $${MYSQL_DATABASE:-app} -e 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./infra/local/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migration:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: "no"
    environment:
      DB_URL: ${COMPOSE_DB_URL:-mysql+asyncmy://app:app@mysql:3306/app}
      DB_SYNC_URL: ${COMPOSE_DB_SYNC_URL:-mysql+pymysql://app:app@mysql:3306/app}
      SECRET_KEY: ${SECRET_KEY:-jwt-demo-secret-key-change-me}
    command: ["alembic", "upgrade", "head"]
    depends_on:
      mysql:
        condition: service_healthy

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      LOG_FORMAT: ${LOG_FORMAT:-text}
      SECRET_KEY: ${SECRET_KEY:-jwt-demo-secret-key-change-me}
      DB_URL: ${COMPOSE_DB_URL:-mysql+asyncmy://app:app@mysql:3306/app}
      DB_SYNC_URL: ${COMPOSE_DB_SYNC_URL:-mysql+pymysql://app:app@mysql:3306/app}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      REDIS_URL: ${COMPOSE_REDIS_URL:-redis://redis:6379/0}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      STORAGE_LOCAL_ROOT: ${COMPOSE_STORAGE_LOCAL_ROOT:-/app/uploads}
      STORAGE_LOCAL_BASE_URL: ${COMPOSE_STORAGE_LOCAL_BASE_URL:-http://localhost:8000/static}
      ENABLE_METRICS: ${ENABLE_METRICS:-false}
      CORS_ORIGINS: ${COMPOSE_CORS_ORIGINS:-http://localhost:5173,http://localhost}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-1}
      SENDER_EMAIL: ${SENDER_EMAIL:-}
      GOOGLE_SMTP_PASSWORD: ${GOOGLE_SMTP_PASSWORD:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
    ports:
      - "8000:8000"
    volumes:
      - backend-uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  celery-worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["celery", "-A", "app.core.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      LOG_FORMAT: ${LOG_FORMAT:-text}
      SECRET_KEY: ${SECRET_KEY:-jwt-demo-secret-key-change-me}
      DB_URL: ${COMPOSE_DB_URL:-mysql+asyncmy://app:app@mysql:3306/app}
      DB_SYNC_URL: ${COMPOSE_DB_SYNC_URL:-mysql+pymysql://app:app@mysql:3306/app}
      REDIS_URL: ${COMPOSE_REDIS_URL:-redis://redis:6379/0}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      STORAGE_LOCAL_ROOT: ${COMPOSE_STORAGE_LOCAL_ROOT:-/app/uploads}
      SENDER_EMAIL: ${SENDER_EMAIL:-}
      GOOGLE_SMTP_PASSWORD: ${GOOGLE_SMTP_PASSWORD:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      API_BASE_URL: ${COMPOSE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  mysql-data:
  redis-data:
  backend-uploads:
