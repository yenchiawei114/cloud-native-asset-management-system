              "show": false
            },
            "showHeader": true
          },
          "transformations": [
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "handler": "Route",
                  "status": "Status",
                  "Value": "Requests"
                }
              }
            }
          ]
        }
      ]
