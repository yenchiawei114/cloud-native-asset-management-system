              "legendFormat": "{{pod}}",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 8,
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ],
              "displayMode": "table",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Duration Quantiles",
          "datasource": {
            "type": "prometheus",
            "uid": "${prom_ds}"
          },
          "gridPos": {
            "x": 12,
            "y": 9,
            "w": 12,
            "h": 9
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${prom_ds}"
              },
              "expr": "histogram_quantile(0.5,  sum(rate(http_request_duration_seconds_bucket{job=\"backend\"}[$__rate_interval])) by (le))",
              "legendFormat": "p50 backend",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${prom_ds}"
              },
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"backend\"}[$__rate_interval])) by (le))",
              "legendFormat": "p95 backend",
              "refId": "B"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${prom_ds}"
              },
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=\"backend\"}[$__rate_interval])) by (le))",
              "legendFormat": "p99 backend",
              "refId": "C"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${prom_ds}"
              },
              "expr": "histogram_quantile(0.5,  sum(rate(http_request_duration_seconds_bucket{job=\"backend\"}[$__rate_interval])) by (le, pod))",
              "legendFormat": "p50 {{pod}}",
              "refId": "D"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${prom_ds}"
              },
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"backend\"}[$__rate_interval])) by (le, pod))",
              "legendFormat": "p95 {{pod}}",
              "refId": "E"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${prom_ds}"
              },
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=\"backend\"}[$__rate_interval])) by (le, pod))",
              "legendFormat": "p99 {{pod}}",
              "refId": "F"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 8,
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ],
              "displayMode": "table",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 4,
          "type": "table",
          "title": "Status Codes — Last 5m",
          "datasource": {
            "type": "prometheus",
            "uid": "${prom_ds}"
          },
          "gridPos": {
            "x": 0,
            "y": 18,
            "w": 24,
            "h": 8
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${prom_ds}"
              },
              "expr": "sum(increase(http_requests_total{job=\"backend\"}[5m])) by (handler, status)",
              "legendFormat": "{{handler}} {{status}}",
              "refId": "A",
              "instant": true,
              "format": "table"
            }
          ],
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          },
          "options": {
