alloy:
  configMap:
    create: true
    content: |
      // Kubernetes pod discovery for asset-mgmt namespace
      discovery.kubernetes "pods" {
        role = "pod"
        namespaces {
          names = ["asset-mgmt"]
        }
      }

      // Relabeling: enrich with useful labels
      discovery.relabel "pods" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          target_label  = "app"
        }
      }

      // Collect logs via k8s API (no hostPath needed — works on Autopilot)
      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pods.output
        forward_to = [loki.process.backend_json.receiver]
      }

      // Parse JSON for backend container logs
      loki.process "backend_json" {
        stage.match {
          selector = "{container=\"backend\"}"

          stage.json {
            expressions = {
              severity = "severity",
              message  = "message",
              logger   = "logger",
            }
          }
          stage.labels {
            values = {
              severity = "",
              logger   = "",
            }
          }
        }
        forward_to = [loki.write.default.receiver]
      }

      // Write to Loki
      loki.write "default" {
        endpoint {
          url = "http://loki.monitoring.svc:3100/loki/api/v1/push"
        }
      }

controller:
  type: daemonset

serviceAccount:
  create: true
  name: alloy

rbac:
  create: true

crds:
  create: true

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
