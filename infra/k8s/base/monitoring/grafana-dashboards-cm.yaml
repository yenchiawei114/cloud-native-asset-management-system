apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  golden-signals.json: |
    {
      "title": "Reference - 4 Golden Signals",
      "uid": "cnams-golden-signals",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timezone": "browser",
      "tags": [
        "golden-signals",
        "observability"
      ],
      "annotations": {
        "list": []
      },
      "templating": {
        "list": [
          {
            "current": {
              "selected": false,
              "text": "Prometheus",
              "value": "Prometheus"
            },
            "hide": 0,
            "includeAll": false,
            "label": "Prometheus",
            "name": "prom_ds",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource"
          },
          {
            "current": {
              "selected": false,
              "text": "GMP",
              "value": "GMP"
            },
            "hide": 0,
            "includeAll": false,
            "label": "GMP",
            "name": "gmp_ds",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Latency — p95 / p99 (backend)",
          "datasource": {
            "type": "prometheus",
            "uid": "${prom_ds}"
          },
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 9
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${prom_ds}"
              },
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"backend\"}[$__rate_interval])) by (le))",
              "legendFormat": "p95 backend",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${prom_ds}"
              },
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=\"backend\"}[$__rate_interval])) by (le))",
              "legendFormat": "p99 backend",
              "refId": "B"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${prom_ds}"
              },
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"backend\"}[$__rate_interval])) by (le, pod))",
              "legendFormat": "p95 {{pod}}",
              "refId": "C"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${prom_ds}"
              },
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=\"backend\"}[$__rate_interval])) by (le, pod))",
              "legendFormat": "p99 {{pod}}",
              "refId": "D"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 8,
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ],
              "displayMode": "table",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Traffic — Request Rate (req/s)",
          "datasource": {
            "type": "prometheus",
            "uid": "${prom_ds}"
          },
          "gridPos": {
            "x": 0,
            "y": 9,
            "w": 12,
            "h": 9
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${prom_ds}"
              },
              "expr": "sum(rate(http_requests_total{job=\"backend\"}[$__rate_interval]))",
              "legendFormat": "backend",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${gmp_ds}"
              },
              "expr": "sum(rate(nginx_http_requests_total{namespace=\"asset-mgmt\"}[$__rate_interval])) by (pod)",
              "legendFormat": "frontend {{pod}}",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 8,
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ],
              "displayMode": "table",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Errors — 5xx / 4xx Rate (req/s)",
          "datasource": {
            "type": "prometheus",
            "uid": "${prom_ds}"
          },
          "gridPos": {
            "x": 12,
            "y": 9,
            "w": 12,
            "h": 9
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${prom_ds}"
              },
              "expr": "sum(rate(http_requests_total{job=\"backend\",status=~\"5.*\"}[$__rate_interval]))",
              "legendFormat": "5xx backend",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${prom_ds}"
              },
              "expr": "sum(rate(http_requests_total{job=\"backend\",status=~\"4.*\"}[$__rate_interval]))",
              "legendFormat": "4xx backend",
              "refId": "B"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${prom_ds}"
              },
              "expr": "sum(rate(http_requests_total{job=\"backend\",status=~\"4.*\"}[$__rate_interval])) by (pod)",
              "legendFormat": "4xx {{pod}}",
              "refId": "C"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 8,
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ],
              "displayMode": "table",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Saturation — CPU Utilization of Cgroup Limit (%)",
          "datasource": {
            "type": "prometheus",
            "uid": "${gmp_ds}"
          },
          "gridPos": {
            "x": 0,
            "y": 18,
            "w": 24,
            "h": 9
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${gmp_ds}"
              },
              "expr": "kubernetes_io:container_cpu_limit_utilization{namespace_name=\"asset-mgmt\", container_name!=\"\"}",
              "legendFormat": "{{container_name}} {{pod_name}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 8,
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ],
              "displayMode": "table",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Active Application Replicas",
          "datasource": {
            "type": "prometheus",
            "uid": "${prom_ds}"
          },
          "gridPos": {
            "x": 0,
            "y": 27,
            "w": 8,
            "h": 5
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${prom_ds}"
              },
              "expr": "kube_deployment_status_replicas_available{namespace=\"asset-mgmt\", deployment=\"backend\"}",
              "legendFormat": "backend",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${prom_ds}"
              },
              "expr": "kube_deployment_status_replicas_available{namespace=\"asset-mgmt\", deployment=\"frontend\"}",
              "legendFormat": "frontend",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 0.001
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "value"
          }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Backend p95 Latency By Replica",
          "datasource": {
            "type": "prometheus",
            "uid": "${prom_ds}"
          },
          "gridPos": {
            "x": 8,
            "y": 27,
            "w": 8,
            "h": 5
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${prom_ds}"
              },
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"backend\"}[$__rate_interval])) by (le, pod))",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 8,
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ],
              "displayMode": "table",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Backend 5xx By Replica",
          "datasource": {
            "type": "prometheus",
            "uid": "${prom_ds}"
          },
          "gridPos": {
            "x": 16,
            "y": 27,
            "w": 8,
            "h": 5
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${prom_ds}"
              },
              "expr": "sum(rate(http_requests_total{job=\"backend\",status=~\"5.*\"}[$__rate_interval])) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 8,
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ],
              "displayMode": "table",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        }
      ]
    }
